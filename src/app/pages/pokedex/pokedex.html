@if (loading) {
  <app-loading message="Cargando Pokédex..." />
} @else if (hasError) {
  <app-error-state
    title="No se pudo cargar la Pokédex"
    message="Problema al consultar la PokeAPI"
    (retry)="loadPokemons()"
  />
} @else {
  <div class="pokedex-page">
    <div class="pokedex-title">
      <img src="logo.png" alt="" />
    </div>

    <!-- <app-type-filter (typeSelected)="onTypeSelected($event)"></app-type-filter> -->

    <div class="pokedex-grid">
      <app-card
        *ngFor="let pokemon of pokemons"
        [pokemon]="pokemon"
        (click)="openPokemon(pokemon)"
      ></app-card>

      <app-modal
        *ngIf="selectedPokemon"
        [pokemon]="selectedPokemon"
        (close)="closeModal()"
      ></app-modal>
    </div>
  </div>
}
