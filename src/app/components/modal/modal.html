<div class="modal-backdrop" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    
    <div class="modal-image-section">
      <img [src]="pokemon.image" [alt]="pokemon.name" />
    </div>

    <div class="modal-header">
      <h2 class="modal-title">{{ pokemon.name | titlecase }}</h2>
      <button class="close-btn" (click)="onClose()">✕</button>
    </div>

    <div class="modal-body">
      <!-- Types -->
      <div class="types-section">
        <span 
          *ngFor="let type of pokemon.types" 
          class="type-badge"
          [style.background-color]="type.color"
        >
          {{ type.name | titlecase }}
        </span>
      </div>

      <!-- Description -->
      <p class="description">{{ pokemon.description }}</p>

      <!-- Weaknesses and Resistances -->
      <div class="relations-grid">
        <div class="relation-group">
          <h4 class="relation-title">Strong Against</h4>
          <div class="relation-items">
            <span 
              *ngFor="let resistance of pokemon.resistances" 
              class="relation-item"
              [style.background-color]="resistance.color"
            >
              {{ resistance.name | titlecase }}
            </span>
          </div>
        </div>
        <div class="relation-group">
          <h4 class="relation-title">Weak To</h4>
          <div class="relation-items">
            <span 
              *ngFor="let weakness of pokemon.weaknesses" 
              class="relation-item"
              [style.background-color]="weakness.color"
            >
              {{ weakness.name | titlecase }}
            </span>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-section">
        <h3 class="stats-title">Base Stats</h3>
        <div class="stats-container">
          <div *ngFor="let stat of pokemon.stats" class="stat-item">
            <div class="stat-header">
              <span class="stat-name">{{ stat.name | titlecase }}</span>
              <span class="stat-value">{{ stat.baseStat }}</span>
            </div>
            <div class="stat-bar">
              <div class="stat-fill" [style.width.%]="(stat.baseStat / 150) * 100"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
